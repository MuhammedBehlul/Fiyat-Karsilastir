name: Günlük fiyat scraping

on:
  schedule:
    # Her gün 03:30 UTC = 06:30 TR — site trafiğinin en düşük olduğu saatler
    - cron: '30 3 * * *'
  workflow_dispatch: # elle tetikleme (GitHub UI'dan veya /admin panelindeki butondan)

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Her site AYRI job olarak paralel çalışır (matrix) — sırayla TEK job'ta
    # koşulduğunda Trendyol/N11 gibi yavaş siteler (gerçek koşularda 50-75 dk)
    # tek bir 30 dk'lık timeout'u aşıp job'ı öldürüyor, ardından gelen tüm
    # siteler HİÇ başlamıyordu (ScrapeRun'da kalıcı "running" satırları ve
    # yarım kalan taramalar bu yüzdendi). Matrix ile bir sitenin yavaşlaması/
    # engellenmesi diğerlerini etkilemez.
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        site: [trendyol, hepsiburada, amazon, vatan, n11]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Bağımlılıkları kur
        run: npm ci

      - name: Playwright Chromium kur
        run: npx playwright install --with-deps chromium

      - name: ${{ matrix.site }} scrape ediliyor
        run: npm run scrape -- ${{ matrix.site }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          REVALIDATE_URL: ${{ secrets.REVALIDATE_URL }}
          REVALIDATE_TOKEN: ${{ secrets.REVALIDATE_TOKEN }}
