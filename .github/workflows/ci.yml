name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Bağımlılıkları kur
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Birim testleri
        run: npm test

      - name: Production build
        run: npm run build
        env:
          # Build sırasında DB'ye erişilmez: sitemap gibi statik üretimler
          # sorgu hatasını yakalayıp boş sonuçla devam eder. Placeholder URL,
          # Prisma client'ının init olması için yeterli.
          DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci'
          DIRECT_URL: 'postgresql://ci:ci@localhost:5432/ci'
          AUTH_SECRET: 'ci-build-only-secret'
          NEXT_PUBLIC_SITE_URL: 'http://localhost:3000'
